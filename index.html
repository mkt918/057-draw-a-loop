<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draw a Loop!</title>
  <meta name="description" content="グリッド上で一筆書きのループを描くパズルゲーム「Draw a Loop!」">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="graph-bg min-h-screen pb-20">
    <div class="max-w-6xl mx-auto px-4 py-8">

      <!-- ヘッダー -->
      <div class="flex items-start justify-between mb-6">
        <h1 class="caveat text-6xl font-bold text-blue-600 tracking-tight">✏️ Draw a Loop!</h1>
        <div class="border-2 border-gray-800 px-3 py-1 bg-white mt-3 shadow-sm">
          <span class="caveat text-base font-bold tracking-widest">xxuurruuii</span>
        </div>
      </div>

      <!-- 説明 -->
      <div class="bg-white/80 backdrop-blur border border-blue-100 rounded-xl p-4 mb-10 max-w-xl shadow-sm">
        <p class="caveat text-xl text-gray-700">セルをドラッグして、全セルを通る1本のループを描こう！</p>
        <p class="caveat text-base text-gray-500 mt-1">始めたセルに戻ってきたらループ完成！○はヒントマーク。</p>
        <p class="caveat text-sm text-blue-400 mt-1">ドラッグで移動 / 手前のセルに戻るとやり直し / リセットで最初から</p>
      </div>

      <!-- トレースモード：loop.png背景 + フリードロー -->
      <div class="mb-14">
        <h2 class="caveat text-3xl font-bold mb-2 text-indigo-600">✏️ Trace Mode</h2>
        <p class="caveat text-gray-500 mb-3 text-base">画像の上に自由に線を描こう！</p>
        <div class="relative inline-block rounded-xl overflow-hidden shadow-lg border border-gray-200 bg-white">
          <img id="trace-bg" src="loop.png" alt="Draw a Loop reference"
            style="display:block; max-width:100%; height:auto;">
          <canvas id="trace-canvas"
            style="position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;touch-action:none;">
          </canvas>
        </div>
        <div class="flex flex-wrap gap-2 mt-3 items-center">
          <button id="trace-mode-draw"
            class="caveat text-sm rounded-lg px-4 py-1.5 border-2 border-blue-500 bg-blue-500 text-white shadow-sm transition">✏️
            描く</button>
          <button id="trace-mode-erase"
            class="caveat text-sm rounded-lg px-4 py-1.5 border-2 border-gray-300 bg-white text-gray-500 shadow-sm transition hover:border-orange-400 hover:text-orange-500">🧹
            消しゴム</button>
          <button id="trace-undo"
            class="caveat text-sm rounded-lg px-4 py-1.5 border-2 border-gray-300 bg-white text-gray-500 shadow-sm transition hover:border-indigo-400 hover:text-indigo-500">↩️
            一つ戻る</button>
          <button id="trace-clear"
            class="caveat text-sm rounded-lg px-4 py-1.5 border-2 border-gray-300 bg-white text-gray-500 shadow-sm transition hover:border-red-400 hover:text-red-500">🗑
            全消し</button>
        </div>
      </div>

      <!-- パズルセット -->
      <div id="sets-container" class="space-y-14"></div>


    </div>
  </div>

  <!-- 正解トースト -->
  <div id="toast"
    class="fixed top-6 left-1/2 -translate-x-1/2 bg-green-500 text-white px-8 py-4 rounded-2xl shadow-2xl hidden z-50 flex items-center gap-3 transition-all">
    <span class="text-3xl">🎉</span>
    <span class="caveat text-2xl font-bold">Solved!</span>
  </div>

  <script src="puzzles.js"></script>
  <script src="app.js"></script>
  <script src="trace.js"></script>
</body>

</html>
